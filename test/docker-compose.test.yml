# FinAlly E2E stack (PLAN.md §12).
#
# Two services:
#   app    - the production image (built from ../Dockerfile), run with
#            LLM_MOCK=true and the simulator (no MASSIVE_API_KEY) for
#            deterministic tests. A fresh DB each run (tmpfs at /app/db).
#   e2e    - the Playwright runner (browser deps live here, not in prod),
#            waits for app health, then runs the suite against http://app:8000.
#
# Usage (from test/):
#   docker compose -f docker-compose.test.yml up --build \
#       --abort-on-container-exit --exit-code-from e2e
#
# The e2e service's exit code becomes the compose exit code, so CI passes/fails
# on the suite result.

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      # Dummy key so any startup validation passes; mock mode never calls out.
      - OPENROUTER_API_KEY=test-mock-key
      # Unset/empty -> built-in simulator (deterministic, no network).
      - MASSIVE_API_KEY=
    # Fresh, throwaway DB per run - no named volume, no host bind.
    tmpfs:
      - /app/db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
    expose:
      - "8000"

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.runner
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:8000
      - CI=1
    # Surface the HTML report + traces on the host for debugging.
    volumes:
      - ./playwright-report:/e2e/playwright-report
      - ./test-results:/e2e/test-results
